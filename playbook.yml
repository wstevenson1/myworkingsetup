- name: Bootstrap dev environment
  hosts: local
  connection: local
  become: yes
  gather_facts: yes
  vars:
    common_packages:
      - git
      - python3
      - python3-pip
      - curl
      - wget
      - unzip
      - rsync
      - ca-certificates
      - bash-completion
      - jq
      - sqlite3
      # 'locales' is Debian-specific; moved to Debian-only packages below
    debian_extra_packages:
      - python3-apt
      - python3-venv
      - openssh-server
      - postgresql-client
      - postgresql-contrib
      - locales
    redhat_extra_packages:
      - openssh-server
      - postgresql-server
      - postgresql
      - postgresql-contrib
      - which
      - man-db
    debian_brew_packages:
      - build-essential
      - procps
      - file
      - git
      - curl
      - ruby
      - python3
    redhat_brew_packages:
      - gcc
      - gcc-c++
      - make
      - tar
      - file
      - git
      - curl
      - ruby
      - python3
  tasks:
    - name: Ensure apt cache is up to date
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_facts.os_family == 'Debian'

    - name: Ensure dnf cache is up to date
      dnf:
        update_cache: yes
      when: ansible_facts.os_family == 'RedHat'

    - name: Ensure Linuxbrew build dependencies are installed
      package:
        name: "{{ debian_brew_packages if ansible_facts.os_family == 'Debian' else redhat_brew_packages }}"
        state: present
      when: ansible_facts.os_family in ['Debian', 'RedHat']

    - name: Install common packages
      package:
        name: "{{ common_packages + (debian_extra_packages if ansible_facts.os_family == 'Debian' else redhat_extra_packages) }}"
        state: present

    - name: Set Homebrew user
      set_fact:
        homebrew_user: "{{ ansible_env.SUDO_USER | default(ansible_env.USER) }}"

    - name: Set Homebrew prefix
      set_fact:
        homebrew_prefix: >-
          {{ '/home/linuxbrew/.linuxbrew' if homebrew_user == 'root' else ('/home/' + homebrew_user + '/.linuxbrew') }}

    - name: Ensure Homebrew prefix directory exists
      file:
        path: "{{ homebrew_prefix }}"
        state: directory
        mode: '0755'
        owner: "{{ homebrew_user }}"
        group: "{{ homebrew_user }}"

    - name: Install Homebrew on Linux if missing
      become: yes
      become_user: "{{ homebrew_user }}"
      shell: |
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" </dev/null
      args:
        creates: "{{ homebrew_prefix }}/bin/brew"
      environment:
        CI: "1"
        NONINTERACTIVE: "1"
        HOME: "/home/{{ homebrew_user }}"

    - name: Ensure Homebrew CLI formulae are installed
      become: yes
      become_user: "{{ homebrew_user }}"
      shell: "{{ homebrew_prefix }}/bin/brew install $(cat {{ playbook_dir }}/homebrew_formulae.txt)"
      args:
        chdir: "{{ playbook_dir }}"
      environment:
        PATH: "{{ homebrew_prefix }}/bin:{{ ansible_env.PATH }}"
      when: homebrew_prefix is defined

    - name: Try install PostgreSQL 14 on Debian/Ubuntu
      apt:
        name: postgresql-14
        state: present
      when: ansible_facts.os_family == 'Debian'
      register: postgresql_14_install
      failed_when: false

    - name: Ensure default PostgreSQL is installed on Debian/Ubuntu if 14 is unavailable
      apt:
        name:
          - postgresql
          - postgresql-client
          - postgresql-contrib
        state: present
      when:
        - ansible_facts.os_family == 'Debian'
        - postgresql_14_install is failed

    - name: Create user-local bin directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_env.USER }}"
        group: "{{ ansible_env.USER }}"
      loop:
        - "{{ ansible_env.HOME }}/.local/bin"
        - "{{ ansible_env.HOME }}/.programs"
        - "{{ ansible_env.HOME }}/.logs"

    - name: Copy bash aliases
      copy:
        src: files/aliases
        dest: "{{ ansible_env.HOME }}/.aliases"
        owner: "{{ ansible_env.USER }}"
        group: "{{ ansible_env.USER }}"
        mode: '0644'

    - name: Copy bash history sqlite helper
      copy:
        src: files/bash-history-sqlite.sh
        dest: "{{ ansible_env.HOME }}/.bash-history-sqlite.sh"
        owner: "{{ ansible_env.USER }}"
        group: "{{ ansible_env.USER }}"
        mode: '0755'

    - name: Deploy portable bashrc
      template:
        src: files/bashrc.j2
        dest: "{{ ansible_env.HOME }}/.bashrc"
        owner: "{{ ansible_env.USER }}"
        group: "{{ ansible_env.USER }}"
        mode: '0644'

    - name: Deploy portable bash_profile
      template:
        src: files/bash_profile.j2
        dest: "{{ ansible_env.HOME }}/.bash_profile"
        owner: "{{ ansible_env.USER }}"
        group: "{{ ansible_env.USER }}"
        mode: '0644'

    - name: Ensure HISTDB exists
      file:
        path: "{{ ansible_env.HOME }}/.hist.db"
        state: touch
        mode: '0600'
        owner: "{{ ansible_env.USER }}"
        group: "{{ ansible_env.USER }}"

    - name: Ensure bash-preexec helper is installed
      get_url:
        url: https://raw.githubusercontent.com/rcaloras/bash-preexec/master/bash-preexec.sh
        dest: "{{ ansible_env.HOME }}/.bash-preexec.sh"
        mode: '0755'

    - name: Ensure SSH run directory exists
      file:
        path: /var/run/sshd
        state: directory
        mode: '0755'

    - name: Ensure ssh host keys are present
      command: ssh-keygen -A
      args:
        creates: /etc/ssh/ssh_host_rsa_key

    - name: Ensure sshd listens on port 2222
      blockinfile:
        path: /etc/ssh/sshd_config
        marker: '# {mark} ANSIBLE MANAGED PORT 2222'
        block: |
          Port 2222
          PasswordAuthentication yes
          PermitRootLogin prohibit-password
          UsePAM yes
          ChallengeResponseAuthentication no
      notify: restart sshd

    - name: Start and enable SSH service
      service:
        name: "{{ 'ssh' if ansible_facts.os_family == 'Debian' else 'sshd' }}"
        state: started
        enabled: yes

    - name: Start PostgreSQL service
      service:
        name: postgresql
        state: started
        enabled: yes
      when: ansible_facts.os_family == 'Debian' or ansible_facts.os_family == 'RedHat'

    - name: Install ansible package via pip if ansible is missing
      pip:
        name: ansible
        executable: /usr/bin/pip3
      when: ansible_facts.os_family == 'Debian' or ansible_facts.os_family == 'RedHat'

  handlers:
    - name: restart sshd
      service:
        name: "{{ 'ssh' if ansible_facts.os_family == 'Debian' else 'sshd' }}"
        state: restarted
